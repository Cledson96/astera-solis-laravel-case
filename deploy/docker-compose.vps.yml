name: ${COMPOSE_PROJECT_NAME:-astera-solis-production}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astera_solis}
      POSTGRES_USER: ${POSTGRES_USER:-astera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:?API_IMAGE obrigatoria}
    restart: unless-stopped
    env_file:
      - ${API_ENV_FILE:-../.env.api}
    environment:
      RUN_MIGRATIONS_ON_DEPLOY: ${RUN_MIGRATIONS_ON_DEPLOY:-true}
      RUN_SEED_ON_DEPLOY: ${RUN_SEED_ON_DEPLOY:-true}
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/up >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 5

  worker:
    image: ${API_IMAGE:?API_IMAGE obrigatoria}
    restart: unless-stopped
    env_file:
      - ${API_ENV_FILE:-../.env.api}
    environment:
      RUN_LARAVEL_BOOTSTRAP: "false"
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--sleep=3", "--timeout=90"]
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE obrigatoria}
    restart: unless-stopped
    env_file:
      - ${WEB_ENV_FILE:-../.env.web}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  postgres_data:
  redis_data:
